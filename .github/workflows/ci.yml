name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @inventrix/api lint && pnpm --filter @inventrix/frontend lint
        continue-on-error: true

      - name: Type check
        run: pnpm --filter @inventrix/api exec tsc --noEmit && pnpm --filter @inventrix/frontend exec tsc --noEmit

      - name: Test
        run: pnpm --filter @inventrix/api test --run && pnpm --filter @inventrix/frontend test --run
        continue-on-error: true

      - name: Build
        run: pnpm --filter @inventrix/api build && pnpm --filter @inventrix/frontend build

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
